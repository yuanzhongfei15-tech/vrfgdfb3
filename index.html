<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="https://pl29502394.effectivecpmnetwork.com/a5/0e/f3/a50ef31af820cb54bcca5c611ed2457f.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI工具导航 - 发现最好用的AI工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="data.js"></script>
    <style>
        * {
            scroll-behavior: smooth;
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .dark-transition {
            transition: background-color 0.3s ease, color 0.3s ease;
        }
    </style>
</head>
<body class="dark-transition bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="sticky top-0 z-50 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-700 dark-transition">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-2">
                    <span class="text-2xl">🚀</span>
                    <h1 class="text-xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">
                        AI工具导航
                    </h1>
                </div>
                
                <div class="flex items-center gap-4">
                    <button id="themeToggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                        <span id="sunIcon" class="text-xl hidden dark:block">☀️</span>
                        <span id="moonIcon" class="text-xl block dark:hidden">🌙</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <section class="text-center mb-10">
            <h2 class="text-3xl sm:text-4xl font-bold mb-4">
                发现最好用的AI工具
            </h2>
            <p class="text-gray-600 dark:text-gray-400 text-lg">
                精选AI写作、绘画、视频、音频、办公、编程工具，提升你的效率
            </p>
        </section>

        <section class="mb-8">
            <div class="relative max-w-2xl mx-auto">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="搜索AI工具..." 
                    class="w-full px-6 py-4 pl-14 text-lg rounded-2xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 transition-all"
                >
                <span class="absolute left-5 top-1/2 -translate-y-1/2 text-xl">🔍</span>
            </div>
        </section>

        <section class="mb-8">
            <div id="categoryButtons" class="flex flex-wrap justify-center gap-2 sm:gap-3">
            </div>
        </section>

        <section>
            <div id="toolsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">
            </div>
            
            <div id="emptyState" class="hidden text-center py-16">
                <span class="text-6xl mb-4 block">😕</span>
                <h3 class="text-xl font-semibold mb-2">没有找到相关工具</h3>
                <p class="text-gray-600 dark:text-gray-400">试试其他关键词或分类</p>
            </div>
        </section>
    </main>

    <footer class="mt-16 py-8 border-t border-gray-200 dark:border-gray-700 dark-transition">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-600 dark:text-gray-400">
            <p>© 2026 AI工具导航 · 由AI驱动</p>
        </div>
    </footer>

    <script>
        let currentCategory = 'all';
        let searchQuery = '';

        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        function renderCategories() {
            const container = document.getElementById('categoryButtons');
            container.innerHTML = categories.map(cat => `
                <button 
                    class="category-btn px-4 py-2 rounded-full font-medium transition-all ${
                        cat.id === currentCategory 
                            ? 'bg-gradient-to-r from-blue-600 to-purple-600 text-white shadow-lg' 
                            : 'bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 border border-gray-200 dark:border-gray-700'
                    }"
                    data-category="${cat.id}"
                >
                    <span class="mr-1">${cat.icon}</span>
                    ${cat.name}
                </button>
            `).join('');

            container.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentCategory = btn.dataset.category;
                    renderCategories();
                    renderTools();
                });
            });
        }

        function getFilteredTools() {
            return toolsData.filter(tool => {
                const matchesCategory = currentCategory === 'all' || tool.category === currentCategory;
                const matchesSearch = searchQuery === '' || 
                    tool.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    tool.description.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCategory && matchesSearch;
            });
        }

        function renderTools() {
            const container = document.getElementById('toolsGrid');
            const emptyState = document.getElementById('emptyState');
            const filteredTools = getFilteredTools();

            if (filteredTools.length === 0) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            container.classList.remove('hidden');
            emptyState.classList.add('hidden');

            container.innerHTML = filteredTools.map(tool => `
                <a 
                    href="${tool.url}" 
                    target="_blank" 
                    rel="noopener noreferrer"
                    class="card-hover fade-in block bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-200 dark:border-gray-700 hover:shadow-xl dark-transition"
                >
                    <div class="flex items-start justify-between mb-4">
                        <span class="text-4xl">${tool.icon}</span>
                        <span class="text-xs px-3 py-1 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400">
                            ${categories.find(c => c.id === tool.category)?.name || tool.category}
                        </span>
                    </div>
                    <h3 class="text-lg font-bold mb-2 text-gray-900 dark:text-white">${tool.name}</h3>
                    <p class="text-gray-600 dark:text-gray-400 text-sm line-clamp-3">${tool.description}</p>
                    <div class="mt-4 flex items-center text-blue-600 dark:text-blue-400 text-sm font-medium">
                        <span>立即访问</span>
                        <span class="ml-1">→</span>
                    </div>
                </a>
            `).join('');
        }

        function initSearch() {
            const searchInput = document.getElementById('searchInput');
            let debounceTimer;
            
            searchInput.addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    searchQuery = e.target.value.trim();
                    renderTools();
                }, 200);
            });
        }

        function init() {
            initTheme();
            renderCategories();
            renderTools();
            initSearch();

            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
    <script src="https://pl29502395.effectivecpmnetwork.com/c9/34/fc/c934fc915912a06599e459598b7cb2fb.js"></script>

</body>
</html>
